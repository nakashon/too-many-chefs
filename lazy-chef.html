<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔪 Chop Chop!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔪</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Patrick+Hand&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-dark: #1A202C; --bg-wood: #2D3748; --bg-wood-light: #4A5568;
  --text-warm: #EDF2F7; --text-muted: #CBD5E0;
  --orange: #ED8936; --golden: #F6E05E; --red: #E53E3E;
  --green: #48BB78; --purple: #805AD5; --teal: #38B2AC;
  --glass-bg: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.12);
}
body {
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(135deg, #0e141b 0%, #1f2a38 50%, #0e141b 100%);
  color: var(--text-warm); min-height: 100vh; overflow-x: hidden; position: relative;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; z-index: 1; }
.screen.active { display: flex; }
.btn { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.2rem; border: none; border-radius: 16px; padding: 16px 40px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; touch-action: manipulation; }
.btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
.btn:active { transform: translateY(0); }
.btn-primary { background: linear-gradient(145deg, #ED8936, #DD6B20); color: white; box-shadow: 0 6px 25px rgba(237,137,54,0.4); }
.btn-primary:hover { box-shadow: 0 8px 30px rgba(237,137,54,0.6); }

/* Language Toggle */
.lang-toggle { position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:4px;background:rgba(0,0,0,.5);border-radius:20px;padding:4px;backdrop-filter:blur(8px); }
.lang-btn { padding:6px 14px;border-radius:16px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-muted);font-family:'Fredoka',sans-serif;touch-action:manipulation; }
.lang-btn.active { background:var(--orange);color:white; }
.lang-btn:hover:not(.active) { background:rgba(255,255,255,.1); }
html[dir="rtl"] .player-row { border-left:none;border-right:4px solid var(--orange); }

/* Title Screen */
.title-float-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.title-float { position: absolute; font-size: 2rem; opacity: 0.15; animation: floatUp linear infinite; }
@keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
.title-logo { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 700; text-align: center; text-shadow: 0 4px 0 #cc4400, 0 8px 0 #993300, 0 12px 30px rgba(0,0,0,0.5); animation: titleBounce 2s ease-in-out infinite, titleGlow 3s ease-in-out infinite alternate; margin-bottom: 10px; }
@keyframes titleBounce { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }
@keyframes titleGlow { 0% { text-shadow: 0 4px 0 #cc4400, 0 8px 0 #993300, 0 12px 30px rgba(0,0,0,0.5); } 100% { text-shadow: 0 4px 0 #cc4400, 0 8px 0 #993300, 0 12px 30px rgba(0,0,0,0.5), 0 0 40px rgba(255,107,53,0.3); } }
.title-sub { font-size: clamp(1rem, 3vw, 1.5rem); color: var(--golden); font-weight: 500; margin-bottom: 30px; text-align: center; }
.title-lore { max-width: 600px; text-align: center; font-family: 'Patrick Hand', cursive; font-size: 1.15rem; line-height: 1.6; color: var(--text-muted); margin-bottom: 10px; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px 28px; border: 1px solid rgba(255,255,255,0.05); }
.title-goal { font-size: 1.2rem; color: var(--golden); margin-bottom: 40px; text-align: center; }
.title-rules { max-width: 680px; margin-bottom: 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rule-card { background: rgba(0,0,0,0.35); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.06); }
.rule-card .rule-mini-card { width: 48px; height: 66px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.rule-card .rule-mini-card svg { width: 32px; height: 32px; }
.rule-card .rule-text { font-size: 0.85rem; color: var(--text-muted); }
.rule-card .rule-text strong { color: var(--text-warm); }

/* Setup Screen */
#screen-setup { gap: 24px; }
.setup-title { font-size: 2rem; font-weight: 700; }
.count-selector { display: flex; gap: 10px; margin: 10px 0; }
.count-btn { width: 52px; height: 52px; border-radius: 50%; border: 3px solid var(--bg-wood-light); background: var(--bg-wood); color: var(--text-warm); font-family: 'Fredoka', sans-serif; font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
.count-btn:hover, .count-btn.selected { border-color: var(--orange); background: rgba(255,107,53,0.2); transform: scale(1.1); }
.count-btn.selected { background: var(--orange); color: white; }
.player-configs { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 500px; }
.player-row { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 8px 12px; border-left: 4px solid var(--orange); animation: slideIn 0.3s ease-out forwards; opacity: 0; transform: translateX(-20px); flex-wrap: wrap; }
@keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
.player-row .chef-hat { font-size: 1.5rem; cursor: pointer; }
.player-row input { flex: 1; min-width: 80px; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 6px 10px; color: var(--text-warm); font-family: 'Fredoka', sans-serif; font-size: 0.95rem; }
.player-row input:focus { outline: none; border-color: var(--orange); }
.ai-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; user-select: none; }
.ai-toggle input { display: none; }
.ai-toggle .toggle-track { width: 40px; height: 22px; border-radius: 11px; background: rgba(255,255,255,0.15); position: relative; transition: background 0.2s; }
.ai-toggle input:checked + .toggle-track { background: var(--orange); }
.ai-toggle .toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
.ai-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(18px); }
.avatar-picker { display:none;gap:4px;margin-top:4px;flex-wrap:wrap;width:100%; }
.avatar-picker.open { display:flex; }
.avatar-opt { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;border:2px solid transparent;transition:all .2s;background:rgba(255,255,255,.05);touch-action:manipulation; }
.avatar-opt:hover { background:rgba(255,255,255,.12);transform:scale(1.15); }
.avatar-opt.selected { border-color:var(--orange);background:rgba(255,107,53,.2);transform:scale(1.2); }

/* Game Screen */
#screen-game { justify-content: flex-start; padding: 16px; min-height: 100vh; gap: 12px; }
.game-nav { display:flex;gap:8px;width:100%;max-width:900px;justify-content:flex-end;padding:0 4px;margin-bottom:-4px; }
.btn-nav { background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px 10px;font-size:1.1rem;cursor:pointer;color:var(--text-muted);transition:all .2s;backdrop-filter:blur(6px);min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation; }
.btn-nav:hover { background:rgba(255,255,255,0.12);color:var(--text-warm);transform:scale(1.05); }

.turn-banner { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 700; text-align: center; padding: 10px 24px; border-radius: 16px; background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); width: 100%; max-width: 900px; border: 2px solid rgba(255,255,255,0.1); animation: bannerPop 0.4s ease-out; }
@keyframes bannerPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

/* Scoreboard */
.scoreboard-strip { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;width:100%;max-width:900px; }
.sb-chip { display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,0.06);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.08);font-size:.8rem;transition:all .3s;overflow:hidden; }
.sb-chip .sb-avatar { font-size:1.1rem;flex-shrink:0; }
.sb-chip .sb-name { white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1; }
.sb-chip .sb-count { font-weight:700;font-size:1rem;flex-shrink:0; }
.sb-chip.sb-active { border-color:var(--golden);background:rgba(247,201,72,.1); }
.sb-chip.sb-next { border-color:var(--teal);background:rgba(78,205,196,.1); }
.sb-chip.sb-zero { border-color:var(--green);background:rgba(72,187,120,.15); }

/* Spotlight */
.spotlight-row { display:flex;gap:10px;justify-content:center;width:100%;max-width:900px;align-items:stretch;flex-wrap:wrap; }
.spot-station { flex:1 1 0;max-width:400px;min-width:0;background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);border-radius:16px;padding:16px 20px;border:2.5px solid rgba(255,255,255,.08);transition:all .3s;position:relative;overflow:hidden;min-height:100px; }
.spot-station::before { content:'';position:absolute;top:0;left:0;right:0;height:5px;border-radius:16px 16px 0 0; }
.spot-station.spot-active { border-color:var(--golden);box-shadow:0 0 25px rgba(247,201,72,.3); }
.spot-station.spot-active::before { background:var(--golden); }
.spot-station.spot-next { border-color:var(--teal);box-shadow:0 0 15px rgba(78,205,196,.15); }
.spot-station.spot-next::before { background:var(--teal); }
.spot-station.spot-zero { border-color:var(--green); }
.spot-label { font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px; }
.spot-label.label-active { color:var(--golden); }
.spot-label.label-next { color:var(--teal); }
.spot-name { font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:6px; }
.spot-count { font-size:2rem;font-weight:700;display:flex;align-items:center;gap:6px; }
.spot-count small { font-size:.75rem;font-weight:400;color:var(--text-muted); }
.spot-vs { flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--text-muted);padding:0 4px; }

/* Kitchen + Cards */
.kitchen-area { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; width: 100%; max-width: 900px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; min-height: 180px; position: relative; overflow: hidden; backdrop-filter: blur(12px); }
.card-area { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 10px; min-height: 130px; width: 100%; perspective: 800px; }
.card-container { width: 80px; height: 110px; perspective: 600px; position: relative; cursor: pointer; transition: transform 0.2s ease; touch-action: manipulation; }
.card-container:hover { transform: translateY(-4px); }
.card-container:active { transform: scale(0.95); }
.card-container.disabled { pointer-events: none; opacity: 0.6; cursor: default; }
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 3px 12px rgba(0,0,0,0.4); overflow: hidden; }
.card-back { background: linear-gradient(135deg, #2D3748, #4A5568); border: 2px solid rgba(255,255,255,0.12); }
.card-front { transform: rotateY(180deg); padding: 4px; }
.card-front .card-svg { width: 44px; height: 44px; margin-top: 4px; }
.card-front .card-label { font-family: 'Fredoka', sans-serif; font-size: 0.65rem; font-weight: 600; margin-top: auto; margin-bottom: 6px; text-align: center; line-height: 1.1; padding: 0 2px; }
.card-cooking .card-front { background: linear-gradient(135deg, #2563EB, #3B82F6); border: 2px solid #60A5FA; color: white; }
.card-ready .card-front { background: linear-gradient(135deg, #059669, #10B981); border: 2px solid var(--golden); color: white; }
.card-dump .card-front { background: linear-gradient(135deg, #7C3AED, #A855F7); border: 2px solid #c084fc; color: white; }
.card-burnt .card-front { background: linear-gradient(135deg, #DC2626, #F97316); border: 2px solid #fbbf24; color: white; animation: burntGlow 1.5s ease-in-out infinite; }
@keyframes burntGlow { 0%, 100% { box-shadow: 0 0 8px rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 20px rgba(239,68,68,0.8), 0 0 40px rgba(249,115,22,0.3); } }
.card-swap .card-front { background: linear-gradient(135deg, #D97706, #F59E0B); border: 2px solid #FDE68A; color: white; animation: swapGlow 1.5s ease-in-out infinite; }
@keyframes swapGlow { 0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.4); } 50% { box-shadow: 0 0 20px rgba(245,158,11,0.8), 0 0 40px rgba(217,119,6,0.3); } }

/* Heat Selector */
.heat-selector { display:flex;gap:6px;align-items:center;margin:6px 0; }
.heat-label { font-size:0.9rem;color:var(--text-muted);margin-right:8px; }
.heat-btn { padding:8px 16px;border-radius:12px;border:2px solid var(--bg-wood-light);background:var(--bg-wood);color:var(--text-warm);font-family:'Fredoka',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;min-width:44px;min-height:44px; }
.heat-btn:hover,.heat-btn.selected { border-color:var(--orange);background:rgba(255,107,53,0.2);transform:scale(1.05); }
.heat-btn.selected { background:var(--orange);color:white; }

/* Swap overlay */
.swap-overlay { position:absolute;inset:0;background:rgba(245,158,11,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;z-index:50;animation:swapFlash 0.8s ease-out;pointer-events:none; }
.swap-overlay .swap-text { font-size:clamp(1.8rem,6vw,3rem);font-weight:700;color:#FDE68A;text-shadow:0 0 30px rgba(245,158,11,0.8),0 4px 0 #92400E;animation:bustSlam 0.5s ease-out; }
@keyframes swapFlash { 0%{background:rgba(245,158,11,0.5)} 100%{background:rgba(245,158,11,0.1)} }
.spot-station.spot-swapping { animation:spotSwap 0.6s ease-in-out; }
@keyframes spotSwap { 0%{transform:scale(1);opacity:1} 30%{transform:scale(0.7) rotate(10deg);opacity:0.5} 70%{transform:scale(0.7) rotate(-10deg);opacity:0.5} 100%{transform:scale(1);opacity:1} }

/* Card animations */
.card-container.card-fly-up { animation: cardFlyUp 0.6s ease-in forwards; }
@keyframes cardFlyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-200px) scale(0.5); opacity: 0; } }
.card-container.card-fly-right { animation: cardFlyRight 0.6s ease-in forwards; }
@keyframes cardFlyRight { 0% { transform: translateX(0) scale(1); opacity: 1; } 100% { transform: translateX(200px) scale(0.6); opacity: 0; } }
.card-container.card-fly-back { animation: cardFlyBack 0.5s ease-in forwards; }
@keyframes cardFlyBack { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.7) translateY(20px); opacity: 0; } }
.card-container.card-deal { animation: cardDeal 0.3s ease-out forwards; }
@keyframes cardDeal { 0% { transform: scale(0.3) translateY(-40px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
.card-container.card-shake { animation: cardShake 0.5s ease-in-out; }
@keyframes cardShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

/* Stop Button */
.btn-stop { background: linear-gradient(145deg, #F6E05E, #ED8936); color: #1a0a00; font-size: 1.5rem; padding: 16px 60px; border-radius: 50px; box-shadow: 0 4px 20px rgba(246,224,94,0.3); animation: stopPulse 2s ease-in-out infinite; }
.btn-stop:hover { box-shadow: 0 8px 35px rgba(247,201,72,0.6); animation: none; }
@keyframes stopPulse { 0%, 100% { box-shadow: 0 4px 20px rgba(247,201,72,0.4); } 50% { box-shadow: 0 4px 35px rgba(247,201,72,0.7); } }
.btn-stop.hidden { display: none; }

/* Bust Overlay */
.bust-overlay { position: absolute; inset: 0; background: rgba(220, 38, 38, 0.25); border-radius: 20px; display: flex; align-items: center; justify-content: center; z-index: 50; animation: bustFlash 0.8s ease-out; pointer-events: none; }
.bust-overlay .bust-text { font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 700; color: #fbbf24; text-shadow: 0 0 30px rgba(220,38,38,0.8), 0 4px 0 #991b1b; animation: bustSlam 0.5s ease-out; }
@keyframes bustFlash { 0% { background: rgba(220,38,38,0.6); } 100% { background: rgba(220,38,38,0.15); } }
@keyframes bustSlam { 0% { transform: scale(2); opacity: 0; } 60% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }

/* Narrator */
.narrator { width:100%;max-width:900px;text-align:center;padding:14px 24px;border-radius:14px;font-family:'Patrick Hand',cursive;font-size:1.25rem;color:var(--text-warm);min-height:56px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.08);transition:all .3s;line-height:1.4; }
.narrator.status-burnt { color:#fca5a5;background:rgba(229,62,62,.15);border-color:rgba(230,57,70,.3); }
.narrator.status-win { color:var(--golden);background:rgba(247,201,72,.15);border-color:rgba(247,201,72,.3);font-weight:600; }
.narrator.status-ready { color:#6ee7b7;background:rgba(72,187,120,.12);border-color:rgba(16,185,129,.25); }
.narrator.status-dump { color:#c4b5fd;background:rgba(128,90,213,.12);border-color:rgba(168,85,247,.25); }
.narrator.status-cooking { color:#93C5FD;background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.25); }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }

/* Blink animations for stations */
.spot-station.blink-green { animation:blinkGreen .4s ease-out; }
@keyframes blinkGreen { 0%{box-shadow:0 0 0 rgba(16,185,129,0)} 50%{box-shadow:0 0 30px rgba(16,185,129,.7)} 100%{box-shadow:0 0 0 rgba(16,185,129,0)} }
.spot-station.blink-purple { animation:blinkPurple .4s ease-out; }
@keyframes blinkPurple { 0%{box-shadow:0 0 0 rgba(168,85,247,0)} 50%{box-shadow:0 0 30px rgba(168,85,247,.7)} 100%{box-shadow:0 0 0 rgba(168,85,247,0)} }
.spot-station.blink-red { animation:blinkRed .4s ease-out; }
@keyframes blinkRed { 0%{box-shadow:0 0 0 rgba(239,68,68,0)} 50%{box-shadow:0 0 30px rgba(239,68,68,.7)} 100%{box-shadow:0 0 0 rgba(239,68,68,0)} }
.sb-chip.blink-green { animation:blinkGreen .4s ease-out; }
.sb-chip.blink-purple { animation:blinkPurple .4s ease-out; }
.sb-chip.blink-red { animation:blinkRed .4s ease-out; }

/* Spot count animations */
.spot-count.count-punch { animation:countPunch .4s ease-out; }
@keyframes countPunch { 0%{transform:scale(1)} 40%{transform:scale(1.6)} 100%{transform:scale(1)} }
.spot-count.count-shrink { animation:countShrink .4s ease-out; }
@keyframes countShrink { 0%{transform:scale(1);opacity:1} 40%{transform:scale(.5);opacity:.3} 100%{transform:scale(1);opacity:1} }
.spot-station.active { animation:pulseBorder 2s ease-in-out infinite; }
@keyframes pulseBorder { 0%,100%{box-shadow:0 0 8px rgba(247,201,72,.3)} 50%{box-shadow:0 0 20px rgba(247,201,72,.6),0 0 40px rgba(247,201,72,.2)} }

/* Station float numbers */
.station-float { position:absolute;z-index:30;font-size:1.8rem;font-weight:800;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.6);animation:floatBigNum 1.4s ease-out forwards;white-space:nowrap; }
@keyframes floatBigNum { 0%{opacity:1;transform:translateY(0) scale(.7);} 20%{opacity:1;transform:translateY(-8px) scale(1.2);} 100%{opacity:0;transform:translateY(-50px) scale(1);} }

/* Victory Screen */
#screen-victory { gap: 20px; text-align: center; }
.victory-title { font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 700; color: var(--golden); text-shadow: 0 4px 0 #b8860b, 0 8px 30px rgba(0,0,0,0.4); animation: titleBounce 2s ease-in-out infinite; }
.winner-display { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 600; padding: 16px 40px; border-radius: 20px; background: rgba(247,201,72,0.15); border: 2px solid var(--golden); }
.victory-subtitle { font-size: 1.2rem; color: var(--text-muted); font-family: 'Patrick Hand', cursive; }
.victory-stats { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
.stat-card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
.stat-card .stat-val { font-size: 1.8rem; font-weight: 700; }
.stat-card .stat-label { font-size: 0.75rem; color: var(--text-muted); }
.confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 200; overflow: hidden; }
.confetti-piece { position: absolute; width: 10px; height: 10px; top: -20px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

/* Flipped summary badges */
.flip-summary { display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0; }
.flip-badge { padding:4px 10px;border-radius:12px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:4px; }

.flip-badge.badge-cooking { background:rgba(59,130,246,.2);color:#93C5FD;border:1px solid rgba(59,130,246,.3); }

  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}

  ready: () => { playTone(523, 0.12, 'square', 0.07); setTimeout(() => playTone(659, 0.12, 'square', 0.07), 100); setTimeout(() => playTone(784, 0.18, 'square', 0.08), 200); },
  dump: () => { playTone(350, 0.15, 'square', 0.06); setTimeout(() => playTone(250, 0.2, 'square', 0.06), 120); },
  burnt: () => { playTone(120, 0.4, 'sawtooth', 0.1); setTimeout(() => playTone(80, 0.5, 'sawtooth', 0.08), 200); },
  win: () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.25, 'square', 0.08), i*150)); },
  stop: () => { playTone(440, 0.1, 'square', 0.05); setTimeout(() => playTone(440, 0.1, 'square', 0.05), 120); },
  swap: () => { [300,400,500,600,500,400].forEach((f,i) => setTimeout(() => playTone(f, 0.1, 'square', 0.06), i*80)); }
};

// ==================== TURN MANAGEMENT ====================
function currentPlayer() { return G.players[G.currentIndex]; }
function nextPlayerIndex() { return (G.currentIndex + 1) % G.players.length; }
function nextPlayer() { return G.players[nextPlayerIndex()]; }

// ==================== CARD GENERATION ====================
function rollCards(count) {
  // Heat-based probabilities (out of variable total):
  // Swap weight = half of burnt weight (rounded up), min 0.5
  const burntWeight = selectedHeat === 'L' ? 1 : selectedHeat === 'H' ? 3 : 2;
  const swapWeight = burntWeight / 2;
  const cookWeight = 6;
  const total = cookWeight + 2 + 2 + burntWeight + swapWeight;
  const results = [];
  for (let i = 0; i < count; i++) {
    const roll = Math.random() * total;
    if (roll < cookWeight) results.push(CARD.COOKING);
    else if (roll < cookWeight + 2) results.push(CARD.READY);
    else if (roll < cookWeight + 4) results.push(CARD.DUMP);
    else if (roll < cookWeight + 4 + burntWeight) results.push(CARD.BURNT);
    else results.push(CARD.SWAP);
  }
  return results;
}

// ==================== FLIP PHASE ====================
function startFlipPhase() {
  const p = currentPlayer();
  const count = p.orders;
  if (count <= 0) { nextTurn(); return; }

  G.luck.results = rollCards(count);
  G.luck.flipped = new Array(count).fill(false);
  G.luck.busted = false;

  renderCards();
  setNarrator(t('tapReveal'), '');
  hideBtn('btn-stop');
  document.getElementById('flip-summary').innerHTML = '';

  // Animate cards dealing out
  const containers = document.querySelectorAll('.card-container');
  containers.forEach((c, i) => {
    c.style.opacity = '0';
    setTimeout(() => {
      c.style.opacity = '';
      c.classList.add('card-deal');
    }, i * 80);
  });

  const dealTime = count * 80 + 300;

  // Enable taps after deal animation
  setTimeout(() => {
    if (!p.isAI) enableCardTaps();
  }, dealTime);
}

function renderCards() {
  const area = document.getElementById('card-area');
  const count = G.luck.results.length;
  area.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const cardType = CARD_DATA[G.luck.results[i]];
    const labelKey = ['cardCooking','cardReady','cardDump','cardBurnt','cardSwap'][G.luck.results[i]];
    const container = document.createElement('div');
    container.className = `card-container card-${cardType.cls}`;
    container.dataset.index = i;
    container.innerHTML = `
      <div class="card-inner" id="card-inner-${i}">
        <div class="card-face card-back">${CARD_SVG.back}</div>
        <div class="card-face card-front">
          <div class="card-svg">${CARD_SVG[cardType.key]}</div>
          <div class="card-label">${t(labelKey)}</div>
        </div>
      </div>
    `;
    area.appendChild(container);
  }
}

function enableCardTaps() {
  document.querySelectorAll('.card-container').forEach(el => {
    const idx = parseInt(el.dataset.index);
    if (!G.luck.flipped[idx]) {
      el.classList.remove('disabled');
      el.onclick = (e) => { e.preventDefault(); flipCard(idx); };
      el.ontouchend = (e) => { e.preventDefault(); flipCard(idx); };
    }
  });
}

function disableAllCards() {
  document.querySelectorAll('.card-container').forEach(el => {
    el.classList.add('disabled');
    el.onclick = null;
    el.ontouchend = null;
  });
}

function flipCard(idx) {
  if (isAnimating || G.luck.busted || G.luck.flipped[idx]) return;
  isAnimating = true;
  const myTurnId = turnId;

  const inner = document.getElementById('card-inner-' + idx);
  if (!inner) { isAnimating = false; return; }

  SFX.flip();
  inner.classList.add('flipped');
  G.luck.flipped[idx] = true;
  disableAllCards();

  setTimeout(() => {
    if (turnId !== myTurnId) return;
    const type = G.luck.results[idx];
    if (type === CARD.BURNT) {
      handleBust();
    } else if (type === CARD.SWAP) {
      handleSwap();
    } else {
      playCardSound(type);
      updateFlipSummary();
      const flippedGood = countFlippedType(CARD.READY) + countFlippedType(CARD.DUMP);
      if ((flippedGood > 0 || countFlippedType(CARD.COOKING) > 0) && !currentPlayer().isAI) {
        showBtn('btn-stop', t('nextBtn'));
      }

      const unflipped = G.luck.flipped.filter(f => !f).length;
      if (unflipped === 0) {
        isAnimating = false;
        stopFlipping();
        return;
      }

      setNarrator(t('flipMore'), '');
      isAnimating = false;
      if (!currentPlayer().isAI) enableCardTaps();
    }
  }, 550);
}

function playCardSound(type) {
  if (type === CARD.COOKING) SFX.cooking();
  else if (type === CARD.READY) SFX.ready();
  else if (type === CARD.DUMP) SFX.dump();
  else if (type === CARD.SWAP) SFX.swap();
}

function countFlippedType(type) {
  let count = 0;
  for (let i = 0; i < G.luck.results.length; i++) {
    if (G.luck.flipped[i] && G.luck.results[i] === type) count++;
  }
  return count;
}

function updateFlipSummary() {
  const summary = document.getElementById('flip-summary');
  const ready = countFlippedType(CARD.READY);
  const dump = countFlippedType(CARD.DUMP);
  const cooking = countFlippedType(CARD.COOKING);
  const swap = countFlippedType(CARD.SWAP);
  let html = '';
  if (ready > 0) html += `<span class="flip-badge badge-ready">✅ ${ready}</span>`;
  if (dump > 0) html += `<span class="flip-badge badge-dump">💜 ${dump}</span>`;
  if (cooking > 0) html += `<span class="flip-badge badge-cooking">🎫 ${cooking}</span>`;
  if (swap > 0) html += `<span class="flip-badge badge-swap">🔀 ${swap}</span>`;
  summary.innerHTML = html;
}

// ==================== SWAP ====================
function handleSwap() {
  G.luck.busted = true; // prevent further flips
  disableAllCards();
  hideBtn('btn-stop');
  isAnimating = true;
  const myTurnId = turnId;

  const p = currentPlayer();
  const np = nextPlayer();
  const readyCount = countFlippedType(CARD.READY);
  const dumpCount = countFlippedType(CARD.DUMP);
  const cookingCount = countFlippedType(CARD.COOKING);
  const unflippedCount = G.luck.flipped.filter(f => !f).length;
  const returningCount = cookingCount + unflippedCount;

  // ---- Phase 1: Resolve flipped cards (same as stopFlipping) ----
  let delay = 0;

  if (readyCount > 0) {
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      for (let i = 0; i < G.luck.results.length; i++) {
        if (G.luck.flipped[i] && G.luck.results[i] === CARD.READY) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-up');
        }
      }
      p.orders -= readyCount;
      G.stats.totalServed += readyCount;
      const spotCount = document.getElementById('spot-count-' + G.currentIndex);
      if (spotCount) {
        spotCount.innerHTML = `${p.orders} <small>${t('orders')}</small>`;
        spotCount.classList.add('count-shrink');
        setTimeout(() => spotCount.classList.remove('count-shrink'), 400);
      }
      floatNumber(document.getElementById('spot-' + G.currentIndex), `-${readyCount}`, 'var(--green)');
      setNarrator(t('served', { n: readyCount }), 'status-ready');
      SFX.ready();
    }, delay);
    delay += 900;
  }

  if (dumpCount > 0) {
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      for (let i = 0; i < G.luck.results.length; i++) {
        if (G.luck.flipped[i] && G.luck.results[i] === CARD.DUMP) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-right');
        }
      }
      p.orders -= dumpCount;
      np.orders += dumpCount;
      G.stats.totalDumped += dumpCount;
      const spotCount = document.getElementById('spot-count-' + G.currentIndex);
      if (spotCount) {
        spotCount.innerHTML = `${p.orders} <small>${t('orders')}</small>`;
        spotCount.classList.add('count-shrink');
        setTimeout(() => spotCount.classList.remove('count-shrink'), 400);
      }
      floatNumber(document.getElementById('spot-' + G.currentIndex), `-${dumpCount}`, 'var(--purple)');
      const nIdx = nextPlayerIndex();
      const spotCountNext = document.getElementById('spot-count-' + nIdx);
      if (spotCountNext) {
        spotCountNext.innerHTML = `${np.orders} <small>${t('orders')}</small>`;
        spotCountNext.classList.add('count-punch');
        setTimeout(() => spotCountNext.classList.remove('count-punch'), 400);
      }
      floatNumber(document.getElementById('spot-' + nIdx), `+${dumpCount}`, 'var(--purple)');
      setNarrator(t('dumped', { n: dumpCount, next: np.name }), 'status-dump');
      SFX.dump();
    }, delay);
    delay += 900;
  }

  // Fly remaining cards back
  if (returningCount > 0) {
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      for (let i = 0; i < G.luck.results.length; i++) {
        if ((G.luck.flipped[i] && G.luck.results[i] === CARD.COOKING) || !G.luck.flipped[i]) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-back');
        }
      }
    }, delay);
    delay += 600;
  }

  // Also fly swap card back
  setTimeout(() => {
    if (turnId !== myTurnId) return;
    for (let i = 0; i < G.luck.results.length; i++) {
      if (G.luck.flipped[i] && G.luck.results[i] === CARD.SWAP) {
        const card = document.querySelector(`.card-container[data-index="${i}"]`);
        if (card) card.classList.add('card-fly-back');
      }
    }
  }, delay);

  renderScoreboard();

  // Check victory after resolution
  if (p.orders <= 0) {
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      showVictory(p);
    }, delay + 400);
    return;
  }

  // ---- Phase 2: SWAP overlay + shuffle ----
  const swapStart = delay + 600;

  // Compute shuffle AFTER resolution (orders already updated)
  setTimeout(() => {
    if (turnId !== myTurnId) return;
    SFX.swap();

    const kitchen = document.getElementById('kitchen-area');
    const overlay = document.createElement('div');
    overlay.className = 'swap-overlay';
    overlay.innerHTML = `<div class="swap-text">${t('swap')}</div>`;
    kitchen.appendChild(overlay);
    setNarrator(t('swapMsg'), '');

    const orderCounts = G.players.map(pl => pl.orders);
    let shuffled;
    if (G.players.length === 2) {
      shuffled = [orderCounts[1], orderCounts[0]];
    } else {
      shuffled = [...orderCounts];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      if (shuffled.every((v, i) => v === orderCounts[i])) {
        [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]];
      }
    }

    // Animate stations after brief overlay
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      overlay.remove();
      document.querySelectorAll('.spot-station').forEach(el => el.classList.add('spot-swapping'));
    }, 1000);

    // Apply shuffled counts
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      G.players.forEach((pl, i) => {
        const oldOrders = pl.orders;
        pl.orders = shuffled[i];
        const diff = pl.orders - oldOrders;
        const sc = document.getElementById('spot-count-' + i);
        if (sc) {
          sc.innerHTML = `${pl.orders} <small>${t('orders')}</small>`;
          if (diff !== 0) {
            sc.classList.add(diff > 0 ? 'count-punch' : 'count-shrink');
            setTimeout(() => sc.classList.remove('count-punch', 'count-shrink'), 400);
          }
        }
        if (diff !== 0) {
          const sign = diff > 0 ? '+' : '';
          const color = diff > 0 ? 'var(--red)' : 'var(--green)';
          floatNumber(document.getElementById('spot-' + i), `${sign}${diff}`, color);
        }
      });
      renderScoreboard();
      document.getElementById('flip-summary').innerHTML = '';

      const winner = G.players.find(pl => pl.orders <= 0);
      if (winner) {
        setTimeout(() => showVictory(winner), 600);
        return;
      }
    }, 1600);

    // Auto-advance
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      document.querySelectorAll('.spot-station').forEach(el => el.classList.remove('spot-swapping'));
      isAnimating = false;
      nextTurn();
    }, 2600);
  }, swapStart);
}

// ==================== BUST ====================
function handleBust() {
  if (G.luck.busted) return;
  G.luck.busted = true;
  G.stats.totalBusted++;
  SFX.burnt();
  disableAllCards();
  hideBtn('btn-stop');

  const p = currentPlayer();
  const myTurnId = turnId;

  // Show bust overlay
  const kitchen = document.getElementById('kitchen-area');
  const overlay = document.createElement('div');
  overlay.className = 'bust-overlay';
  overlay.innerHTML = `<div class="bust-text">${t('burnt')}</div>`;
  kitchen.appendChild(overlay);

  // Shake all flipped cards
  document.querySelectorAll('.card-inner.flipped').forEach(el => {
    el.parentElement.classList.add('card-shake');
  });

  setNarrator(t('burnt'), 'status-burnt');

  // After shake, fly ALL cards back to chef (flipped + unflipped)
  setTimeout(() => {
    if (turnId !== myTurnId) return;
    overlay.remove();
    document.querySelectorAll('.card-container').forEach(el => {
      el.classList.remove('card-shake');
      el.classList.add('card-fly-back');
    });
  }, 1400);

  // Auto-advance after cards fly back
  setTimeout(() => {
    if (turnId !== myTurnId) return;
    document.getElementById('flip-summary').innerHTML = '';
    isAnimating = false;
    nextTurn();
  }, 2400);
}

// ==================== STOP FLIPPING ====================
function stopFlipping() {
  if (G.luck.busted) return;
  disableAllCards();
  hideBtn('btn-stop');
  isAnimating = true;
  SFX.stop();

  const p = currentPlayer();
  const np = nextPlayer();
  const readyCount = countFlippedType(CARD.READY);
  const dumpCount = countFlippedType(CARD.DUMP);
  const cookingCount = countFlippedType(CARD.COOKING);
  const unflippedCount = G.luck.flipped.filter(f => !f).length;
  const returningCount = cookingCount + unflippedCount;

  // Animate resolution
  let delay = 0;

  // Ready cards fly up (served — gone for good)
  if (readyCount > 0) {
    setTimeout(() => {
      for (let i = 0; i < G.luck.results.length; i++) {
        if (G.luck.flipped[i] && G.luck.results[i] === CARD.READY) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-up');
        }
      }
      p.orders -= readyCount;
      G.stats.totalServed += readyCount;

      const spotCount = document.getElementById('spot-count-' + G.currentIndex);
      if (spotCount) {
        spotCount.innerHTML = `${p.orders} <small>${t('orders')}</small>`;
        spotCount.classList.add('count-shrink');
        setTimeout(() => spotCount.classList.remove('count-shrink'), 400);
      }
      floatNumber(document.getElementById('spot-' + G.currentIndex), `-${readyCount}`, 'var(--green)');

      setNarrator(t('served', { n: readyCount }), 'status-ready');
      SFX.ready();
    }, delay);
    delay += 900;
  }

  // Dump cards fly right (to next player)
  if (dumpCount > 0) {
    setTimeout(() => {
      for (let i = 0; i < G.luck.results.length; i++) {
        if (G.luck.flipped[i] && G.luck.results[i] === CARD.DUMP) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-right');
        }
      }
      p.orders -= dumpCount;
      np.orders += dumpCount;
      G.stats.totalDumped += dumpCount;

      // Current player loses orders
      const spotCount = document.getElementById('spot-count-' + G.currentIndex);
      if (spotCount) {
        spotCount.innerHTML = `${p.orders} <small>${t('orders')}</small>`;
        spotCount.classList.add('count-shrink');
        setTimeout(() => spotCount.classList.remove('count-shrink'), 400);
      }
      floatNumber(document.getElementById('spot-' + G.currentIndex), `-${dumpCount}`, 'var(--purple)');

      // Next player gains orders
      const nIdx = nextPlayerIndex();
      const spotCountNext = document.getElementById('spot-count-' + nIdx);
      if (spotCountNext) {
        spotCountNext.innerHTML = `${np.orders} <small>${t('orders')}</small>`;
        spotCountNext.classList.add('count-punch');
        setTimeout(() => spotCountNext.classList.remove('count-punch'), 400);
      }
      floatNumber(document.getElementById('spot-' + nIdx), `+${dumpCount}`, 'var(--purple)');

      setNarrator(t('dumped', { n: dumpCount, next: np.name }), 'status-dump');
      SFX.dump();
    }, delay);
    delay += 900;
  }

  // Cooking + unflipped cards fly back to player's hand
  if (returningCount > 0) {
    setTimeout(() => {
      for (let i = 0; i < G.luck.results.length; i++) {
        if (G.luck.flipped[i] && G.luck.results[i] === CARD.COOKING) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-back');
        }
        if (!G.luck.flipped[i]) {
          const card = document.querySelector(`.card-container[data-index="${i}"]`);
          if (card) card.classList.add('card-fly-back');
        }
      }

      if (readyCount === 0 && dumpCount === 0) {
        setNarrator(t('stillCooking', { n: returningCount }), 'status-cooking');
      }
    }, delay);
    delay += 600;
  }

  // Final: show summary and continue
  setTimeout(() => {
    const msgs = [];
    if (readyCount > 0) msgs.push(t('resolveReady', { n: readyCount }));
    if (dumpCount > 0) msgs.push(t('resolveDump', { n: dumpCount, next: np.name }));
    if (returningCount > 0) msgs.push(t('resolveCooking', { n: returningCount }));
    if (msgs.length > 1) setNarrator(msgs.join(' · '), '');

    renderScoreboard();
    document.getElementById('flip-summary').innerHTML = '';

    // Check for victory
    if (p.orders <= 0) {
      setTimeout(() => showVictory(p), 600);
      return;
    }

    hideBtn('btn-stop');
    isAnimating = false;
    setTimeout(() => nextTurn(), 1200);
  }, delay + 400);
}
function floatNumber(parent, text, color) {
  if (!parent) return;
  const el = document.createElement('div');
  el.className = 'station-float';
  el.style.color = color;
  el.textContent = text;
  el.style.left = '50%';
  el.style.top = '30%';
  el.style.transform = 'translateX(-50%)';
  parent.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ==================== NEXT TURN ====================
function nextTurn() {
  // Find next player with orders > 0
  let attempts = 0;
  do {
    G.currentIndex = (G.currentIndex + 1) % G.players.length;
    attempts++;
  } while (G.players[G.currentIndex].orders <= 0 && attempts < G.players.length);

  if (attempts >= G.players.length) {
    // Everyone has orders, shouldn't happen — just proceed
    G.currentIndex = (G.currentIndex) % G.players.length;
  }

  // Check if someone already won
  const winner = G.players.find(p => p.orders <= 0);
  if (winner) {
    showVictory(winner);
    return;
  }

  startTurn();
}

// ==================== AI ====================
function aiTurn() {
  if (G.phase !== 'game' || G.luck.busted) return;
  const p = currentPlayer();
  if (!p.isAI) return;
  const myTurnId = turnId;

  setNarrator(t('aiThinking', { name: p.name }), '');

  const unflippedIndices = [];
  for (let i = 0; i < G.luck.flipped.length; i++) {
    if (!G.luck.flipped[i]) unflippedIndices.push(i);
  }

  if (unflippedIndices.length === 0) return;

  // Decide whether to flip or stop
  const goodFlips = countFlippedType(CARD.READY) + countFlippedType(CARD.DUMP);
  const cookingFlips = countFlippedType(CARD.COOKING);
  const totalFlips = goodFlips + cookingFlips;

  let shouldStop = false;

  if (totalFlips > 0) {
    const avgOrders = G.players.reduce((s, pl) => s + pl.orders, 0) / G.players.length;
    const isBehind = p.orders > avgOrders;

    if (goodFlips >= 2 && !isBehind) shouldStop = true;
    if (goodFlips >= 3) shouldStop = true;
    if (cookingFlips >= 2 && goodFlips === 0) shouldStop = true;
    if (totalFlips >= 3 && goodFlips >= 1 && !isBehind) shouldStop = true;

    if (isBehind && goodFlips < 3 && Math.random() < 0.4) shouldStop = false;
  }

  if (shouldStop && totalFlips > 0) {
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      setNarrator(t('aiStops', { name: p.name }), '');
      setTimeout(() => {
        if (turnId !== myTurnId) return;
        stopFlipping();
      }, 500);
    }, 600);
  } else {
    const pick = unflippedIndices[Math.floor(Math.random() * unflippedIndices.length)];
    setTimeout(() => {
      if (turnId !== myTurnId) return;
      flipCard(pick);
      setTimeout(() => {
        if (turnId !== myTurnId) return;
        if (!G.luck.busted && G.phase === 'game' && currentPlayer().isAI) {
          aiTurn();
        }
      }, 700);
    }, 800 + Math.random() * 400);
  }
}

// ==================== VICTORY ====================
function showVictory(winner) {
  G.phase = 'victory';
  showScreen('victory');
  SFX.win();

  document.getElementById('victory-title').textContent = t('victoryTitle');
  document.getElementById('winner-display').innerHTML = t('victoryWinner', { avatar: winner.avatar, name: winner.name });
  document.getElementById('winner-display').style.borderColor = winner.color;
  document.getElementById('victory-subtitle').textContent = t('victorySubtitle');

  const stats = document.getElementById('victory-stats');
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--teal)">${G.stats.turns}</div><div class="stat-label">${t('statTurns')}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${G.stats.totalServed}</div><div class="stat-label">${t('statServed')}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${G.stats.totalDumped}</div><div class="stat-label">${t('statDumped')}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${G.stats.totalBusted}</div><div class="stat-label">${t('statBusted')}</div></div>
  `;

  spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#ED8936','#F6E05E','#48BB78','#805AD5','#E53E3E','#38B2AC','#ED64A6'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = (Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
}

// ==================== UI HELPERS ====================
function setNarrator(text, cls) {
  const el = document.getElementById('narrator');
  el.className = 'narrator' + (cls ? ' ' + cls : '');
  el.innerHTML = text;
}

function showBtn(id, text) {
  const btn = document.getElementById(id);
  btn.classList.remove('hidden');
  if (text) btn.textContent = text;
}

function hideBtn(id) {
  document.getElementById(id).classList.add('hidden');
}

function confirmHome() {
  if (confirm(t('confirmHome'))) showScreen('title');
}

function confirmRestart() {
  if (confirm(t('confirmRestart'))) startGame();
}

// ==================== INIT ====================
initTitleFloaters();
renderTitleRules();
renderSetup();
</script>
